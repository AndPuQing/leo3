name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 3 * * *'

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/heads/main') }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  smoke-rustfmt:
    name: Smoke / Rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'CI-save-pr-cache') }}
      - name: Check formatting
        run: cargo fmt --all --check

  smoke-clippy:
    name: Smoke / Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'CI-save-pr-cache') }}
      - name: Clippy check
        run: cargo clippy --all-targets --all-features --workspace -- -D warnings

  compat-clippy-beta:
    name: Compat / Clippy (beta)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@beta
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'CI-save-pr-cache') }}
      - name: Clippy check (beta)
        run: cargo clippy --all-targets --all-features --workspace -- -D warnings

  api-semver:
    name: API / Semver Checks
    if: >-
      github.event_name == 'pull_request'
      && !contains(github.event.pull_request.labels.*.name, 'semver-break')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'CI-save-pr-cache') }}
      - name: Install elan
        run: |
          echo "::group::Elan Installation Output"
          set -o pipefail
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          rm -f elan-init
          echo "::endgroup::"
      - name: Setup Lean PATH
        run: |
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
      - name: Get merge base
        id: merge-base
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}
          MERGE_BASE=$(git merge-base HEAD origin/${{ github.event.pull_request.base.ref }})
          echo "sha=$MERGE_BASE" >> "$GITHUB_OUTPUT"
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          package: leo3, leo3-ffi
          baseline-rev: ${{ steps.merge-base.outputs.sha }}

  smoke-msrv:
    name: Smoke / MSRV Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Read MSRV from Cargo.toml
        id: msrv
        run: |
          MSRV=$(grep '^rust-version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          echo "version=$MSRV" >> "$GITHUB_OUTPUT"
      - name: Install Rust ${{ steps.msrv.outputs.version }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.version }}
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'CI-save-pr-cache') }}
      - name: cargo check
        run: LEO3_NO_LEAN=1 cargo check --locked --workspace --all-features

  smoke-no-lean:
    name: Smoke / No Lean
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'CI-save-pr-cache') }}
      - name: Run non-runtime library tests without Lean
        run: LEO3_NO_LEAN=1 cargo test --locked --workspace --exclude leo3 --lib
      - name: Compile all tests without Lean
        run: LEO3_NO_LEAN=1 cargo check --locked --workspace --tests --all-features

  smoke-minimal-surface:
    uses: ./.github/workflows/test.yml
    with:
      os: ubuntu-latest
      lean: stable
      save-cache: ${{ github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'CI-save-pr-cache') }}
      suite: Smoke / Minimal Surface
      command: cargo test --locked -p leo3 --no-default-features --test test_features

  smoke-optional-surface:
    uses: ./.github/workflows/test.yml
    with:
      os: ubuntu-latest
      lean: stable
      save-cache: ${{ github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'CI-save-pr-cache') }}
      suite: Smoke / Optional Feature Surface
      command: 'cargo test --locked -p leo3 --no-default-features --features "macros,meta,io,module-loading,tokio" --test test_features'

  macro-ui:
    name: Macro / UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'CI-save-pr-cache') }}
      - name: Run trybuild UI tests
        run: LEO3_NO_LEAN=1 cargo test --locked -p leo3 --features macros --test test_compile_error

  runtime-core:
    uses: ./.github/workflows/test.yml
    with:
      os: ubuntu-latest
      lean: stable
      save-cache: ${{ github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'CI-save-pr-cache') }}
      suite: Runtime / Core
      command: cargo test --locked -p leo3 --features runtime-tests --test basic --test nat_ops --test string_ops --test array_ops --test test_conversion --test test_gc

  runtime-async:
    uses: ./.github/workflows/test.yml
    with:
      os: ubuntu-latest
      lean: stable
      save-cache: ${{ github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'CI-save-pr-cache') }}
      suite: Runtime / Async
      command: 'cargo test --locked -p leo3 --features "tokio,runtime-tests" --test test_task_async --test test_tokio_bridge'

  macro-runtime:
    uses: ./.github/workflows/test.yml
    with:
      os: ubuntu-latest
      lean: stable
      save-cache: ${{ github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'CI-save-pr-cache') }}
      suite: Macro / Runtime
      command: 'cargo test --locked -p leo3 --features "macros,runtime-tests" --test test_conversion_macros --test test_derive_macros --test test_leanclass --test test_leanclass_codegen --test test_leanclass_minimal --test test_leanfn_macro --test test_lean_instance --test test_leanmodule'

  ffi-check:
    name: Runtime / FFI Check (Linux, Lean stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'CI-save-pr-cache') }}

      - name: Install libclang
        run: sudo apt-get update && sudo apt-get install -y libclang-dev

      - name: Install elan
        run: |
          echo "::group::Elan Installation Output"
          set -o pipefail
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain leanprover/lean4:stable
          rm -f elan-init
          echo "::endgroup::"

      - name: Setup Lean PATH
        run: echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Run FFI validation checks
        run: |
          LEAN_PREFIX="$("$HOME"/.elan/bin/lean --print-prefix)"
          LD_LIBRARY_PATH="$LEAN_PREFIX/lib/lean" cargo test --locked --manifest-path leo3-ffi-check/Cargo.toml

  compat-feature-powerset:
    name: Compat / Feature Powerset
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'CI-build-full')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'CI-save-pr-cache') }}
      - uses: taiki-e/install-action@cargo-hack
      - name: Check all feature combinations
        run: LEO3_NO_LEAN=1 cargo hack check --feature-powerset --exclude-features runtime-tests --workspace --tests

  compat-runtime-matrix:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'CI-build-full')
    strategy:
      fail-fast: ${{ !contains(github.event.pull_request.labels.*.name, 'CI-no-fail-fast') }}
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        lean: ['stable', 'beta', 'nightly', 'v4.20.0']
    uses: ./.github/workflows/test.yml
    with:
      os: ${{ matrix.os }}
      lean: ${{ matrix.lean }}
      save-cache: ${{ github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'CI-save-pr-cache') }}
      suite: Compat / Full Matrix
      command: cargo test --locked --all-features --workspace

  heavy-careful:
    name: Heavy / Careful (UB detection)
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'CI-build-full')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'CI-save-pr-cache') }}
      - uses: taiki-e/install-action@cargo-careful

      - name: Install elan
        run: |
          echo "::group::Elan Installation Output"
          set -o pipefail
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          rm -f elan-init
          echo "::endgroup::"

      - name: Setup Lean PATH
        run: echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Run tests under cargo-careful
        run: cargo careful test --locked --all-features --workspace

  heavy-valgrind:
    name: Heavy / Valgrind
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'CI-build-full')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'CI-save-pr-cache') }}

      - name: Install valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - name: Install elan
        run: |
          echo "::group::Elan Installation Output"
          set -o pipefail
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          rm -f elan-init
          echo "::endgroup::"

      - name: Setup Lean PATH
        run: echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Run tests under valgrind
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUNNER: 'valgrind --leak-check=no --error-exitcode=1'
        run: cargo test --locked --release --all-features --workspace

  heavy-asan:
    name: Heavy / AddressSanitizer
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'CI-build-full')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'CI-save-pr-cache') }}

      - name: Install elan
        run: |
          echo "::group::Elan Installation Output"
          set -o pipefail
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          rm -f elan-init
          echo "::endgroup::"

      - name: Setup Lean PATH
        run: echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Run tests under AddressSanitizer
        env:
          RUSTFLAGS: -Zsanitizer=address
          ASAN_OPTIONS: detect_leaks=0:intercept_tls_get_addr=0:alloc_dealloc_mismatch=0
        run: cargo test --locked -Zbuild-std --target x86_64-unknown-linux-gnu --all-features --workspace

  smoke-docs:
    name: Smoke / Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'CI-save-pr-cache') }}
      - name: Build documentation
        run: cargo doc --locked --workspace --no-deps --all-features
        env:
          LEO3_NO_LEAN: 1
          RUSTDOCFLAGS: -D warnings --cfg docsrs

  coverage:
    name: Heavy / Coverage
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'CI-build-full')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'CI-save-pr-cache') }}
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@nextest

      - name: Install elan
        run: |
          echo "::group::Elan Installation Output"
          set -o pipefail
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          rm -f elan-init
          echo "::endgroup::"

      - name: Setup Lean PATH
        run: |
          echo "$HOME/.elan/bin" >> $GITHUB_PATH
          "$HOME"/.elan/bin/lean --version
          "$HOME"/.elan/bin/lake --version

      - name: Collect coverage data (including doctests)
        run: |
          cargo llvm-cov --no-report nextest
          cargo llvm-cov --no-report --doc
          cargo llvm-cov report --doctests --lcov --output-path lcov.info

      - name: Upload coverage data to codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: ${{ github.event_name == 'pull_request' && 'pr' || 'main' }}

  conclusion:
    name: CI Conclusion
    if: always()
    needs:
      - smoke-rustfmt
      - smoke-clippy
      - api-semver
      - smoke-msrv
      - smoke-no-lean
      - smoke-minimal-surface
      - smoke-optional-surface
      - macro-ui
      - runtime-core
      - runtime-async
      - macro-runtime
      - ffi-check
      - compat-feature-powerset
      - compat-runtime-matrix
      - heavy-careful
      - heavy-valgrind
      - heavy-asan
      - smoke-docs
      - coverage
    runs-on: ubuntu-latest
    steps:
      - name: Result
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::One or more CI jobs failed or were cancelled"
            exit 1
          fi
